<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Grade Calculator</title>

<style>
  body {
    font-family: Arial;
    background: linear-gradient(135deg, #1f1f2e, #2b2b5c);
    color: white;
    text-align: center;
    padding: 40px;
  }

  h1 {
    font-size: 40px;
  }

  .card {
    background: #2f2f4f;
    border-radius: 12px;
    padding: 20px;
    margin: 20px auto;
    width: 80%;
    box-shadow: 0 10px 20px rgba(0,0,0,0.4);
  }

  button {
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    background: #00cec9;
    color: black;
    cursor: pointer;
    font-weight: bold;
  }

  button:hover {
    background: #81ecec;
  }

  pre {
    background: #1e1e2f;
    padding: 15px;
    border-radius: 8px;
    text-align: left;
    overflow-x: auto;
  }
</style>
</head>

<body>

<h1>🎓 Student Grade Calculator</h1>
<p>Interactive Demo (C Project)</p>

<div class="card">
  <h2>Generate Sample Report</h2>
  <button onclick="showReport()">Run Program</button>

  <pre id="output">Click the button to simulate program output...</pre>
</div>

<script>
function showReport() {
  document.getElementById("output").textContent = `
--------------------------------------------------
         STUDENT GRADE REPORT CARD
--------------------------------------------------
  Student Name : Ahmed Khan
  Subjects     : 5
--------------------------------------------------
  Subject  1   : 88.00
  Subject  2   : 76.50
  Subject  3   : 92.00
  Subject  4   : 65.00
  Subject  5   : 81.00
--------------------------------------------------
  Average      : 80.50
  Highest Mark : 92.00
  Lowest Mark  : 65.00
  Grade        : A   (Very Good)
--------------------------------------------------
`;
}
</script>

</body>
</html>
